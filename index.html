<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brands Planets POS</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/styles.css?v=exchange-mode">
</head>
<body>
  <div id="loginPage" class="login-shell">
    <section class="login-card" aria-label="Login panel">
      <div class="login-box">
        <div class="login-logo">BP</div>
        <div class="login-box-head">
          <strong>Brands Planets</strong>
          <span>POS Management System</span>
        </div>
        <form id="loginForm">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" autocomplete="username" placeholder="Enter username" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <div class="password-wrap">
              <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
              <button class="password-toggle" id="passwordToggle" type="button">Show</button>
            </div>
          </div>
          <button class="btn orange login-submit" type="submit">Login</button>
          <div id="loginMessage" class="alert hidden"></div>
        </form>
      </div>
    </section>
  </div>

  <div id="app" class="app hidden">
    <aside id="sidebar" class="sidebar">
      <div class="side-head">
        <div class="mini-mark">BP</div>
        <div><strong>Brands Planets POS</strong><span>Retail Management</span></div>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn light icon mobile-menu" id="menuBtn">Menu</button>
          <div>
            <h2>POS-SYSTEM</h2>
            <span class="muted" id="liveClock"></span>
          </div>
        </div>
        <div class="top-actions">
          <span class="role-pill" id="signedIn"></span>
          <button class="btn light sync-btn" id="syncBtn" title="Sync and refresh system">Sync</button>
          <button class="btn light icon notify-icon" id="notifyBtn" title="Notifications" aria-label="Notifications"><span></span></button>
          <button class="btn ghost" id="logoutBtn">Logout</button>
        </div>
      </header>
      <div id="notificationPanel" class="notification-panel card hidden"></div>
      <div class="content">
        <section id="dashboard" class="section active"></section>
        <section id="inventory" class="section"></section>
        <section id="billing" class="section"></section>
        <section id="reports" class="section"></section>
        <section id="attendance" class="section"></section>
        <section id="dayclose" class="section"></section>
        <section id="expenses" class="section"></section>
        <section id="users" class="section"></section>
        <section id="settings" class="section"></section>
      </div>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="printArea" class="hidden"></div>

  <script src="js/app.js?v=exchange-mode"></script>
</body>
</html>
